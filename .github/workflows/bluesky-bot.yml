name: Chaturbate → Bluesky Poster (2 accounts)

on:
  schedule:
    # ┌───────────── minute (0 - 59)
    # │ ┌───────────── hour (0 - 23)
    # │ │ ┌───────────── day of month (1 - 31)
    # │ │ │ ┌───────────── month (1 - 12)
    # │ │ │ │ ┌───────────── day of week (0 - 6) (Sunday=0 or 7)
    # │ │ │ │ │
    # │ │ │ │ │
    - cron: '10 */19 * * *'     # every 3 hours, at :12 past the hour (e.g. 00:12, 03:12, 06:12, …)
  
  workflow_dispatch:           # allows manual trigger from GitHub Actions tab

permissions:
  contents: read

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install atproto requests

      - name: Run bot (post to both accounts)
        env:
          # ─────────────────────────────────────────────
          #   Required – your two Bluesky accounts
          #   (create App Passwords in Bluesky settings!)
          # ─────────────────────────────────────────────
          BLUESKY_HANDLE1:      ${{ secrets.BLUESKY_HANDLE1 }}
          BLUESKY_PASSWORD1:    ${{ secrets.BLUESKY_PASSWORD1 }}
          BLUESKY_HANDLE2:      ${{ secrets.BLUESKY_HANDLE2 }}
          BLUESKY_PASSWORD2:    ${{ secrets.BLUESKY_PASSWORD2 }}

          # Optional: you can override MAX_POSTS_PER_RUN if you want
          # MAX_POSTS_PER_RUN: 6

        run: python bot.py

      - name: Show summary timestamp
        if: always()
        run: echo "Run finished at $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
